<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHAN Store</title>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5;}

/* HEADER */
header{
background:#222;
color:white;
padding:15px;
text-align:center;
}
header h1{margin:0;}
header p{margin:5px 0 0;opacity:.8;}

/* HERO */
.hero{
height:70vh;
background:url("https://i.ibb.co/TMmSyvqX/IMG-0543.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}
.hero h2{font-size:40px;margin-bottom:20px;text-shadow:0 0 10px black;}
.hero button{
padding:12px 25px;
font-size:18px;
border:none;
background:#ff7a00;
color:white;
border-radius:6px;
cursor:pointer;
}

/* PRODUCTS */
.products{padding:30px 15px;}
.products h2{text-align:center;margin-bottom:20px;}
.carousel{
display:flex;
gap:15px;
overflow-x:auto;
scroll-behavior:smooth;
}
.product{
min-width:220px;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}
.product img{width:100%;border-radius:10px;}
.product h3{margin:10px 0 5px;}
.product p{margin:0;font-weight:bold;}
.product button{
margin-top:10px;
padding:8px 15px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* CART ICON */
.cart-icon{
position:fixed;
top:20px;
right:20px;
background:#ff7a00;
color:white;
padding:12px;
border-radius:50%;
cursor:pointer;
font-size:20px;
z-index:1000;
}
.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

/* CART PANEL */
.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,.2);
padding:20px;
transition:.3s;
overflow-y:auto;
z-index:999;
}
.cart.open{right:0;}
.cart h2{margin-top:0;}
.cart-item{display:flex;justify-content:space-between;margin-bottom:8px;}
.remove{color:red;cursor:pointer;}
.total{font-weight:bold;margin-top:10px;}

/* FORM */
.cart input{width:100%;padding:10px;margin:6px 0;}
.cart button{width:100%;padding:12px;background:#ff7a00;border:none;color:white;margin-top:10px;cursor:pointer;}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px;
border-radius:50%;
font-size:22px;
text-decoration:none;
z-index:1000;
}
</style>
</head>

<body>

<header>
<h1>KHAN Store</h1>
<p>Fresh Finds, Best Prices</p>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h2>Welcome to KHAN Store</h2>
<button onclick="scrollProducts()">Shop Now</button>
</div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">
<h2>Products</h2>
<div class="carousel" id="productList"></div>
</section>

<!-- CART ICON -->
<div class="cart-icon" onclick="toggleCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="total" id="totalPrice"></div>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<button onclick="sendOrder()">Send Order</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/99999999">💬</a>

<script>
/* EMAILJS INIT */
(function(){emailjs.init("YOUR_PUBLIC_KEY");})();

/* PRODUCTS ARRAY */
const products=[
{name:"Fresh Item", price:10, image:"https://i.ibb.co/MytwtNMt/image.jpg"},
{name:"Daily Product", price:12, image:"https://i.ibb.co/KjWWftkT/IMG-0542.jpg"},
{name:"Local Special", price:8, image:"https://i.ibb.co/MytwtNMt/image.jpg"},
{name:"Best Seller", price:15, image:"https://i.ibb.co/KjWWftkT/IMG-0542.jpg"}
];

const productList=document.getElementById("productList");

/* LOAD PRODUCTS */
products.forEach((p,i)=>{
productList.innerHTML+=`
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>`;
});

/* CART SYSTEM */
let cart=[];

function addToCart(index){
cart.push(products[index]);
updateCart();
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function updateCart(){
const items=document.getElementById("cartItems");
items.innerHTML="";
let total=0;
cart.forEach((item,i)=>{
total+=item.price;
items.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>$${item.price}</span>
<span class="remove" onclick="removeItem(${i})">❌</span>
</div>`;
});
document.getElementById("cartCount").innerText=cart.length;
document.getElementById("totalPrice").innerText="Total: $"+total;
}

/* CART TOGGLE */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* SCROLL */
function scrollProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

/* AUTO SCROLL CAROUSEL */
setInterval(()=>{
productList.scrollBy({left:250, behavior:"smooth"});
},3000);

/* SEND ORDER */
function sendOrder(){
const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
if(!name || !phone || cart.length===0){alert("Fill details & add products");return;}
const orderList=cart.map(p=>p.name+" - $"+p.price).join(", ");
const total=cart.reduce((sum,p)=>sum+p.price,0);
const templateParams={
customer_name:name,
phone:phone,
order:orderList,
total:total,
email:"arbazkhaann99@gmail.com"
};
emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",templateParams)
.then(()=>{
alert("Order Sent Successfully!");
cart=[];
updateCart();
document.getElementById("name").value="";
document.getElementById("phone").value="";
});
}
</script>

</body>
</html>
