<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neo Market</title>

<style>

:root{
--primary:#8b5e3c;
--accent:#c97b3b;
--bg:#f5efe7;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

h1,h2,h3{
font-family:Georgia;
}

nav{
display:flex;
justify-content:space-between;
padding:15px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
font-size:22px;
font-weight:bold;
color:var(--primary);
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.hero{
background:var(--primary);
color:white;
text-align:center;
padding:60px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.08);
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:var(--accent);
font-weight:bold;
}

button{
background:var(--accent);
border:none;
color:white;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

input,textarea,select{
width:100%;
padding:8px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

.product-layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.gallery img{
width:100%;
max-width:400px;
}

.success{
background:#d4edda;
padding:15px;
margin-top:20px;
}

.cart-count{
background:var(--accent);
color:white;
border-radius:50%;
padding:2px 7px;
font-size:12px;
}

@media(max-width:700px){
.product-layout{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<nav>
<div class="logo">Neo Market</div>

<div>
<a href="#home">Home</a>
<a href="#cart">Cart <span id="cartCount" class="cart-count">0</span></a>
</div>
</nav>

<div id="app"></div>

<script>

/* CONFIG */

const CONFIG={
currency:"$",
formspree:"https://formspree.io/f/xbdpjpkr",
whatsapp:"923000000000"
};

/* PRODUCTS */

const PRODUCTS=[

{
id:1,
name:"Leather Backpack",
price:79,
category:"bags",
description:"Premium handcrafted leather backpack.",
images:["https://picsum.photos/500?1","https://picsum.photos/500?2"],
stock:10
},

{
id:2,
name:"Minimal Watch",
price:120,
category:"accessories",
description:"Elegant minimalist watch.",
images:["https://picsum.photos/500?3"],
stock:5
},

{
id:3,
name:"Coffee Mug",
price:15,
category:"home",
description:"Ceramic mug.",
images:["https://picsum.photos/500?5"],
stock:25
}

];

/* STORAGE */

function getCart(){
return JSON.parse(localStorage.getItem("neo_cart"))||[];
}

function saveCart(c){
localStorage.setItem("neo_cart",JSON.stringify(c));
updateCartCount();
}

function getWishlist(){
return JSON.parse(localStorage.getItem("neo_wishlist"))||[];
}

function saveWishlist(w){
localStorage.setItem("neo_wishlist",JSON.stringify(w));
}

/* CART */

function addToCart(id){

let cart=getCart();
let item=cart.find(i=>i.id==id);

if(item){
item.qty++;
}else{
cart.push({id,qty:1});
}

saveCart(cart);
render();
}

function removeCart(id){

let cart=getCart().filter(i=>i.id!=id);
saveCart(cart);
render();

}

function updateCartCount(){

let c=getCart().reduce((a,b)=>a+b.qty,0);
document.getElementById("cartCount").innerText=c;

}

/* ROUTER */

window.addEventListener("hashchange",render);

function render(){

let hash=location.hash||"#home";

if(hash.startsWith("#product")){
renderProduct(hash.split("=")[1]);
}
else if(hash=="#cart"){
renderCart();
}
else if(hash=="#checkout"){
renderCheckout();
}
else{
renderHome();
}

}

/* HOME */

function renderHome(){

let html=`

<div class="hero">
<h1>Neo Market</h1>
<p>Modern goods for everyday living</p>
</div>

<div class="container">

<input id="search" placeholder="Search products">

<div class="grid" id="grid"></div>

</div>
`;

app.innerHTML=html;

function show(){

let s=search.value.toLowerCase();

grid.innerHTML="";

PRODUCTS
.filter(p=>p.name.toLowerCase().includes(s))
.forEach(p=>{

grid.innerHTML+=`

<div class="card" onclick="location.hash='#product=${p.id}'">

<img src="${p.images[0]}">

<div class="card-body">

<h3>${p.name}</h3>

<div class="price">${CONFIG.currency}${p.price}</div>

<button onclick="event.stopPropagation();addToCart(${p.id})">Add to Cart</button>

</div>

</div>

`;

});

}

search.oninput=show;
show();

}

/* PRODUCT PAGE */

function renderProduct(id){

let p=PRODUCTS.find(p=>p.id==id);

app.innerHTML=`

<div class="container">

<div class="product-layout">

<div class="gallery">

<img src="${p.images[0]}">

</div>

<div>

<h2>${p.name}</h2>

<p>${p.description}</p>

<div class="price">${CONFIG.currency}${p.price}</div>

<button onclick="addToCart(${p.id})">Add to Cart</button>

</div>

</div>

</div>

`;

}

/* CART */

function renderCart(){

let cart=getCart();

if(cart.length==0){
app.innerHTML="<div class='container'><h2>Cart Empty</h2></div>";
return;
}

let total=0;

let rows=cart.map(c=>{

let p=PRODUCTS.find(p=>p.id==c.id);

total+=p.price*c.qty;

return`
<tr>
<td>${p.name}</td>
<td>${c.qty}</td>
<td>${CONFIG.currency}${p.price*c.qty}</td>
<td><button onclick="removeCart(${c.id})">Remove</button></td>
</tr>
`;

}).join("");

app.innerHTML=`

<div class="container">

<h2>Your Cart</h2>

<table width="100%">
<tr>
<th>Product</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>

${rows}

</table>

<h3>Total: ${CONFIG.currency}${total}</h3>

<a href="#checkout"><button>Checkout</button></a>

</div>

`;

}

/* CHECKOUT WITH FORMSPREE */

function renderCheckout(){

let cart=getCart();

let total=0;

let items=cart.map(c=>{
let p=PRODUCTS.find(p=>p.id==c.id);
total+=p.price*c.qty;
return `${p.name} x ${c.qty}`;
}).join(", ");

let orderId="NM"+Date.now();

app.innerHTML=`

<div class="container">

<h2>Checkout</h2>

<form id="form" method="POST">

<input name="name" placeholder="Name" required>
<input name="email" type="email" placeholder="Email" required>
<input name="phone" placeholder="Phone" required>
<textarea name="address" placeholder="Address" required></textarea>
<textarea name="notes" placeholder="Notes"></textarea>

<input type="hidden" name="_subject" value="New Neo Market Order">

<p><b>Order ID:</b> ${orderId}</p>
<p><b>Items:</b> ${items}</p>
<p><b>Total:</b> ${CONFIG.currency}${total}</p>

<button type="submit">Place Order</button>

</form>

<div id="msg"></div>

</div>

`;

form.onsubmit=async e=>{

e.preventDefault();

let data=new FormData(form);

data.append("items",items);
data.append("total",CONFIG.currency+total);
data.append("orderId",orderId);

try{

let res=await fetch(CONFIG.formspree,{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});

if(res.ok){

localStorage.removeItem("neo_cart");

msg.innerHTML="<div class='success'>Order placed successfully!</div>";

let whatsappMsg=`Order ${orderId}%0A${items}%0ATotal:${CONFIG.currency}${total}`;

window.open(`https://wa.me/${CONFIG.whatsapp}?text=${whatsappMsg}`);

setTimeout(()=>location.hash="#home",3000);

}else{

msg.innerHTML="<div style='color:red'>Order failed.</div>";

}

}catch(err){

msg.innerHTML="<div style='color:red'>Network error.</div>";

}

};

}

/* INIT */

updateCartCount();
render();

</script>

</body>
</html>
